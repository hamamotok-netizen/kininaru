<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<title>気になるリスト</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@300;400;600&family=Noto+Sans+JP:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #F8F7F5;
    --surface: #FFFFFF;
    --border: #EBEBEB;
    --text: #1C1C1E;
    --sub: #8E8E93;
    --accent: #B07D62;
    --accent-light: #F3EDE7;
    --bought: #34C759;
    --danger: #FF3B30;
    --shadow: 0 1px 6px rgba(0,0,0,0.07);
    --radius: 14px;
  }

  body {
    font-family: 'Noto Sans JP', 'Helvetica Neue', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    max-width: 430px;
    margin: 0 auto;
    -webkit-font-smoothing: antialiased;
  }

  /* ── HEADER ── */
  .header {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    position: sticky;
    top: 0;
    z-index: 100;
    padding: 18px 18px 0;
  }
  .header-top {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 14px;
  }
  .header-title { font-family: 'Noto Serif JP', serif; font-size: 20px; font-weight: 300; letter-spacing: 0.12em; }
  .header-count { font-size: 11px; color: var(--sub); margin-top: 2px; letter-spacing: 0.03em; }
  .header-icon {
    width: 42px; height: 42px; border-radius: 50%;
    background: var(--accent-light); display: flex; align-items: center; justify-content: center;
    font-size: 20px; cursor: pointer; overflow: hidden;
    border: 2px solid var(--border); flex-shrink: 0;
    transition: border-color 0.2s;
  }
  .header-icon:active { border-color: var(--accent); }

  /* Purpose filter chips */
  .filter-chips-wrap {
    position: relative;
    overflow: hidden;
    margin-bottom: 0;
  }
  .filter-chips {
    display: flex;
    gap: 7px;
    overflow-x: auto;
    padding-bottom: 12px;
    scrollbar-width: none;
    position: relative;
  }
  .filter-chips::-webkit-scrollbar { display: none; }
  .filter-chips .chip-fixed {
    position: sticky;
    left: 0;
    z-index: 3;
    flex-shrink: 0;
    background: var(--surface);
  }
  .filter-chips .chip-fixed.active {
    background: var(--text);
  }
  .filter-chips-wrap::after {
    content: '';
    position: absolute;
    left: 0;
    top: 0;
    width: 90px;
    height: calc(100% - 12px);
    background: linear-gradient(to right, var(--surface) 68%, transparent 100%);
    pointer-events: none;
    z-index: 2;
  }
  .chip {
    flex-shrink: 0;
    padding: 7px 15px;
    border-radius: 22px;
    border: none;
    cursor: pointer;
    font-size: 12px;
    font-family: inherit;
    font-weight: 400;
    background: var(--surface);
    color: var(--sub);
    box-shadow: var(--shadow);
    transition: all 0.2s;
    white-space: nowrap;
  }
  .chip.active { background: var(--text); color: var(--bg); font-weight: 600; box-shadow: none; }
  body[data-theme="dark"] .chip { background: #2A2A2A; color: #999; }
  body[data-theme="dark"] .chip.active { background: #F0F0F0; color: #0D0D0D; }
  body[data-theme="cute"] .chip.active { background: var(--accent); color: #fff; }

  /* Status tabs */
  .status-tabs {
    display: flex;
    background: var(--bg);
    border-radius: 9px;
    padding: 3px;
    margin-bottom: 12px;
  }
  .tab {
    flex: 1;
    padding: 7px 0;
    border: none;
    cursor: pointer;
    font-size: 11px;
    font-family: inherit;
    border-radius: 7px;
    background: transparent;
    color: var(--sub);
    transition: all 0.2s;
  }
  .tab.active { background: var(--surface); color: var(--text); font-weight: 600; box-shadow: 0 1px 4px rgba(0,0,0,0.08); }
  body[data-theme="dark"] .tab { color: #666; }
  body[data-theme="dark"] .tab.active { background: #2A2A2A; color: #F0F0F0; box-shadow: 0 1px 4px rgba(0,0,0,0.4); }

  /* ── GRID ── */
  .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 11px; padding: 14px 14px 110px; }

  /* ── CARD ── */
  .card {
    background: var(--surface);
    border-radius: var(--radius);
    overflow: hidden;
    box-shadow: var(--shadow);
    cursor: pointer;
    transition: transform 0.15s, opacity 0.2s;
  }
  .card:active { transform: scale(0.97); }
  .card.bought { opacity: 0.6; }

  .card-img-wrap { aspect-ratio: 1/1; overflow: hidden; background: var(--accent-light); position: relative; }
  .card-img { width: 100%; height: 100%; object-fit: cover; display: block; }
  .card-bought-overlay {
    position: absolute; inset: 0;
    background: rgba(255,255,255,0.5);
    display: flex; align-items: center; justify-content: center;
    font-size: 28px;
  }
  .card-badges { position: absolute; top: 8px; left: 8px; display: flex; flex-direction: column; gap: 4px; }
  .badge {
    background: rgba(255,255,255,0.92);
    border-radius: 20px; padding: 3px 8px;
    font-size: 9px; font-weight: 500; color: var(--text);
    white-space: nowrap;
    max-width: 100px;
    overflow: hidden; text-overflow: ellipsis;
  }

  .card-body { padding: 10px 11px 12px; }
  .card-cat { font-size: 10px; color: var(--accent); font-weight: 600; letter-spacing: 0.04em; margin-bottom: 3px; }
  .card-name {
    font-size: 12px; color: var(--text); font-weight: 500; line-height: 1.45; margin-bottom: 5px;
    display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden;
  }
  .card-price { font-size: 12px; color: var(--sub); margin-bottom: 8px; }
  .card-btn {
    width: 100%; padding: 6px 0; border-radius: 7px; cursor: pointer;
    font-size: 10px; font-family: inherit; border: 1px solid var(--border);
    background: transparent; color: var(--sub); transition: all 0.2s;
  }
  .card-btn.bought { background: #EDFBF1; color: var(--bought); border-color: var(--bought); font-weight: 600; }

  /* ── EMPTY ── */
  .empty { text-align: center; padding: 72px 24px; }
  .empty-icon { font-size: 56px; margin-bottom: 16px; }
  .empty-title { color: var(--text); font-size: 15px; font-weight: 500; margin-bottom: 6px; }
  .empty-sub { color: var(--sub); font-size: 13px; line-height: 1.6; }

  /* ── FAB ── */
  .fab {
    position: fixed; bottom: 30px; right: 20px;
    width: 58px; height: 58px; border-radius: 50%;
    border: none; cursor: pointer;
    background: var(--text); color: #fff; font-size: 30px;
    box-shadow: 0 4px 20px rgba(0,0,0,0.22);
    display: flex; align-items: center; justify-content: center;
    z-index: 150; transition: transform 0.15s, box-shadow 0.15s;
    line-height: 1;
  }
  .fab:active { transform: scale(0.93); }

  /* ── OVERLAY ── */
  .overlay {
    display: none;
    position: fixed; inset: 0; z-index: 200;
    flex-direction: column;
  }
  .overlay.open { display: flex; }
  .overlay-backdrop {
    position: absolute; inset: 0;
    background: rgba(0,0,0,0.35);
    backdrop-filter: blur(2px);
  }
  .sheet {
    position: relative; margin-top: auto;
    background: var(--surface);
    border-radius: 22px 22px 0 0;
    max-height: 88vh; overflow-y: auto; -webkit-overflow-scrolling: touch;
    padding: 0 20px 80px;
    overscroll-behavior: contain;
  }
  .sheet-handle { width: 36px; height: 4px; border-radius: 2px; background: var(--border); margin: 12px auto 0; }
  .sheet-header {
    display: flex; justify-content: space-between; align-items: center;
    padding: 16px 0 14px;
    position: sticky; top: 0; background: var(--surface); z-index: 1;
    border-bottom: 1px solid var(--border); margin-bottom: 16px;
  }
  .sheet-title { font-family: 'Noto Serif JP', serif; font-size: 15px; font-weight: 600; letter-spacing: 0.06em; }
  .sheet-close {
    border: none; background: var(--bg); border-radius: 50%;
    width: 30px; height: 30px; cursor: pointer;
    font-size: 15px; color: var(--sub);
    display: flex; align-items: center; justify-content: center;
  }

  /* ── FORM ── */
  label.field-label { display: block; font-size: 11px; color: var(--sub); margin-bottom: 5px; font-weight: 500; letter-spacing: 0.05em; }
  .field { margin-bottom: 14px; }
  input[type=text], input[type=url], textarea, select {
    width: 100%; padding: 11px 13px; border: 1px solid var(--border);
    border-radius: 10px; font-size: 14px; font-family: inherit;
    outline: none; background: var(--bg); color: var(--text);
    appearance: none; -webkit-appearance: none;
  }
  textarea { resize: none; height: 64px; line-height: 1.5; }
  input:focus, textarea:focus, select:focus { border-color: var(--accent); }

  .select-wrap { position: relative; }
  .select-wrap::after { content: '▾'; position: absolute; right: 12px; top: 50%; transform: translateY(-50%); pointer-events: none; color: var(--sub); font-size: 12px; }

  /* Image preview */
  .img-preview-area { display: block;
    border: 2px dashed var(--accent); border-radius: 18px;
    padding: 44px 24px; cursor: pointer; background: var(--accent-light);
    text-align: center; margin-bottom: 14px;
  }
  .img-preview-icon { font-size: 48px; margin-bottom: 12px; }
  .img-preview-text { color: var(--text); font-size: 14px; font-weight: 500; margin-bottom: 4px; }
  .img-preview-sub { color: var(--sub); font-size: 11px; }
  .img-preview { width: 100%; border-radius: var(--radius); object-fit: cover; max-height: 220px; display: none; margin-bottom: 14px; }

  /* Purpose checkboxes */
  .purpose-list { display: flex; flex-direction: column; gap: 8px; }
  .purpose-item {
    display: flex; align-items: center; gap: 10px;
    padding: 10px 13px; border: 1px solid var(--border);
    border-radius: 10px; cursor: pointer; background: var(--bg);
    transition: all 0.15s; user-select: none;
  }
  .purpose-item.checked { border-color: var(--accent); background: var(--accent-light); }
  .purpose-check {
    width: 20px; height: 20px; border-radius: 6px; flex-shrink: 0;
    border: 2px solid var(--border); background: transparent;
    display: flex; align-items: center; justify-content: center;
    font-size: 12px; color: #fff; transition: all 0.15s;
  }
  .purpose-item.checked .purpose-check { background: var(--accent); border-color: var(--accent); }
  .purpose-label { font-size: 13px; color: var(--text); }

  /* Error */
  .error-msg { background: #FFF2F0; border: 1px solid #FFCCC7; border-radius: 8px; padding: 10px 12px; font-size: 12px; color: var(--danger); margin-bottom: 12px; display: none; }
  .error-msg.show { display: block; }

  /* Buttons */
  .btn { padding: 13px; border-radius: 10px; cursor: pointer; font-size: 14px; font-family: inherit; font-weight: 500; border: 1px solid var(--border); background: var(--surface); color: var(--text); width: 100%; transition: opacity 0.15s; }
  .btn:active { opacity: 0.7; }
  .btn-primary { background: var(--text); color: #fff; border-color: var(--text); }
  .btn-danger { color: var(--danger); background: transparent; border: none; font-size: 12px; }
  .btn-amazon { background: #FF9900; color: #fff; border: none; font-size: 13px; font-weight: 600; display: flex; align-items: center; justify-content: center; gap: 6px; text-decoration: none; padding: 13px; border-radius: 10px; }
  .btn-row { display: flex; gap: 8px; }
  .btn-row .btn { flex: 1; padding: 10px; font-size: 12px; }

  /* Detail info rows */
  .info-row { display: flex; justify-content: space-between; padding: 11px 0; border-bottom: 1px solid var(--border); }
  .info-label { font-size: 12px; color: var(--sub); flex-shrink: 0; margin-right: 12px; }
  .info-value { font-size: 13px; color: var(--text); font-weight: 500; text-align: right; word-break: break-all; }

  .purpose-badges { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 14px; }
  .purpose-badge { display: inline-flex; align-items: center; gap: 4px; background: var(--accent-light); border-radius: 20px; padding: 6px 14px; font-size: 12px; color: var(--accent); font-weight: 600; }

  .confirm-box { background: #FFF2F0; border-radius: 10px; padding: 14px; text-align: center; margin-top: 14px; }
  .confirm-text { font-size: 13px; margin-bottom: 10px; }

  .bought-status-btn { width: 100%; padding: 12px; border-radius: 10px; cursor: pointer; font-size: 13px; font-family: inherit; font-weight: 500; border: 1px solid var(--border); background: var(--accent-light); color: var(--text); transition: all 0.2s; margin-bottom: 8px; }
  .bought-status-btn.is-bought { background: #EDFBF1; color: var(--bought); border-color: var(--bought); }

  /* ── LIGHTBOX ── */
  .lightbox {
    display: none;
    position: fixed; inset: 0; z-index: 500;
    background: rgba(0,0,0,0.92);
    align-items: center; justify-content: center;
    padding: 20px;
  }
  .lightbox.open { display: flex; }
  .lightbox-img {
    max-width: 100%; max-height: 90vh;
    object-fit: contain; border-radius: 10px;
    box-shadow: 0 8px 40px rgba(0,0,0,0.5);
  }
  .lightbox-close {
    position: absolute; top: 16px; right: 16px;
    width: 36px; height: 36px; border-radius: 50%;
    background: rgba(255,255,255,0.15); border: none;
    color: #fff; font-size: 18px; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
  }

  .filter-section-label {
    font-size: 10px; color: var(--sub); font-weight: 600;
    letter-spacing: 0.08em; padding: 6px 2px 4px;
  }

  /* ── THEMES ── */
  body[data-theme="dark"] {
    --bg: #0D0D0D; --surface: #1A1A1A; --border: #2E2E2E;
    --text: #F0F0F0; --sub: #888888; --accent: #E0E0E0;
    --accent-light: #222222; --bought: #6FCF97; --shadow: 0 1px 8px rgba(0,0,0,0.5);
  }
  body[data-theme="cute"] {
    --bg: #FDF0F3; --surface: #FFFFFF; --border: #F4C2CE;
    --text: #2D1B20; --sub: #9E6070; --accent: #C8445E;
    --accent-light: #FAE0E5; --bought: #C8445E; --shadow: 0 1px 6px rgba(200,68,94,0.12);
  }

  /* ── THEME PICKER ── */
  .theme-item {
    display: flex; align-items: center; gap: 12px;
    padding: 12px 14px; border: 1px solid var(--border);
    border-radius: 12px; cursor: pointer; background: var(--bg);
    transition: all 0.15s;
  }
  .theme-item:active { opacity: 0.7; }
  .theme-item.selected { border-color: var(--accent); background: var(--accent-light); }
  .theme-preview {
    width: 40px; height: 40px; border-radius: 10px; flex-shrink: 0;
    display: flex; align-items: center; justify-content: center;
  }
  .theme-name { font-size: 13px; font-weight: 600; color: var(--text); margin-bottom: 2px; }
  .theme-desc { font-size: 11px; color: var(--sub); }
  .theme-check { margin-left: auto; color: var(--accent); font-weight: 700; font-size: 15px; flex-shrink: 0; }

  /* ── COLLAPSIBLE HEADER ── */
  .header {
    transition: padding 0.25s ease;
  }
  .header.collapsed .header-count { display: none; }
  .header.collapsed .filter-section-label { display: none; }
  .header.collapsed .filter-chips { display: none; }
  .header.collapsed .status-tabs { margin-bottom: 8px; }
  .header.collapsed { padding-top: 10px; }
  .header-collapse-btn {
    display: flex; align-items: center; justify-content: center;
    width: 100%; padding: 4px 0 8px; cursor: pointer;
    background: none; border: none;
  }
  .header-collapse-indicator {
    width: 32px; height: 3px; border-radius: 2px;
    background: var(--border); transition: transform 0.25s;
  }
  .header.collapsed .header-collapse-indicator { transform: rotate(180deg); }
</style>
</head>
<body>

<!-- ── HEADER ── -->
<div class="header">
  <div class="header-top">
    <div>
      <div class="header-title" id="appTitle">気になるリスト</div>
      <div class="header-count" id="headerCount">0 アイテム</div>
    </div>
    <div class="header-icon" id="profileIcon" onclick="openProfileMenu()" title="設定">
      <img id="profileImg" src="" alt="" style="display:none;width:100%;height:100%;object-fit:cover;border-radius:50%;">
      <span id="profileEmoji">🛍</span>
    </div>
    <input type="file" id="profileInput" accept="image/*" style="display:none" onchange="handleProfilePhoto(this)">
  </div>

  <!-- 目的フィルター -->
  <div class="filter-section-label">目的</div>
  <div class="filter-chips-wrap"><div class="filter-chips" id="purposeChips">
    <button class="chip chip-fixed active" data-purpose="all" onclick="setPurposeFilter('all')">すべて</button>
    <button class="chip" data-purpose="自分用" onclick="setPurposeFilter('自分用')">🙋‍♀️ 自分</button>
    <button class="chip" data-purpose="友達へのプレゼント用" onclick="setPurposeFilter('友達へのプレゼント用')">🎀 友達</button>
    <button class="chip" data-purpose="家族へのプレゼント用" onclick="setPurposeFilter('家族へのプレゼント用')">💝 家族</button>
    <button class="chip" data-purpose="トレンドチェック用" onclick="setPurposeFilter('トレンドチェック用')">✨ トレンド</button>
    <button class="chip" data-purpose="参考・インスピレーション用" onclick="setPurposeFilter('参考・インスピレーション用')">💡 参考</button>
    <button class="chip" data-purpose="旅行・お出かけ用" onclick="setPurposeFilter('旅行・お出かけ用')">✈️ 旅行</button>
  </div></div>

  <!-- カテゴリフィルター -->
  <div class="filter-section-label">カテゴリ</div>
  <div class="filter-chips-wrap"><div class="filter-chips" id="categoryChips">
    <button class="chip chip-fixed active" data-category="all" onclick="setCategoryFilter('all')">すべて</button>
    <button class="chip" data-category="👗 ファッション" onclick="setCategoryFilter('👗 ファッション')">👗 ファッション</button>
    <button class="chip" data-category="💄 美容・スキンケア" onclick="setCategoryFilter('💄 美容・スキンケア')">💄 美容</button>
    <button class="chip" data-category="🍽 カフェ・グルメ" onclick="setCategoryFilter('🍽 カフェ・グルメ')">🍽 グルメ</button>
    <button class="chip" data-category="🏠 インテリア・雑貨" onclick="setCategoryFilter('🏠 インテリア・雑貨')">🏠 インテリア</button>
    <button class="chip" data-category="📚 本・エンタメ" onclick="setCategoryFilter('📚 本・エンタメ')">📚 エンタメ</button>
    <button class="chip" data-category="💪 ライフスタイル" onclick="setCategoryFilter('💪 ライフスタイル')">💪 ライフ</button>
    <button class="chip" data-category="✈️ 旅行・お出かけ" onclick="setCategoryFilter('✈️ 旅行・お出かけ')">✈️ 旅行</button>
    <button class="chip" data-category="🎁 ギフト" onclick="setCategoryFilter('🎁 ギフト')">🎁 ギフト</button>
    <button class="chip" data-category="その他" onclick="setCategoryFilter('その他')">その他</button>
  </div></div>

  <!-- ステータスタブ -->
  <div class="filter-section-label">ステータス</div>
  <div class="status-tabs">
    <button class="tab active" data-status="all" onclick="setStatusFilter('all')">すべて</button>
    <button class="tab" data-status="unbought" onclick="setStatusFilter('unbought')">未購入</button>
    <button class="tab" data-status="bought" onclick="setStatusFilter('bought')">購入済み ✓</button>
  </div>
  <button class="header-collapse-btn" onclick="toggleHeader()" aria-label="フィルターを開閉">
    <div class="header-collapse-indicator"></div>
  </button>
</div>

<!-- ── GRID ── -->
<div class="grid" id="grid"></div>

<!-- ── FAB ── -->
<button class="fab" onclick="openAdd()">＋</button>

<!-- ══════════════════════════════════
     ADD SHEET
════════════════════════════════════ -->
<div class="overlay" id="addOverlay">
  <div class="overlay-backdrop" onclick="closeAdd()"></div>
  <div class="sheet">
    <div class="sheet-handle"></div>
    <div class="sheet-header">
      <span class="sheet-title">写真を追加</span>
      <button class="sheet-close" onclick="closeAdd()">✕</button>
    </div>

    <!-- Image picker -->
    <label for="fileInput" class="img-preview-area" id="imgPickerArea">
      <div class="img-preview-icon">📸</div>
      <div class="img-preview-text">写真を選択</div>
      <div class="img-preview-sub">カメラロール・スクショから選んでください</div>
    </label>
    <img class="img-preview" id="imgPreview" alt="">
    <input type="file" id="fileInput" accept="image/*" style="display:none" onchange="handleFile(this)">

    <div class="error-msg" id="addError"></div>

    <div class="field">
      <label class="field-label">商品名</label>
      <input type="text" id="addName" placeholder="例: UVケアクリーム SPF50+">
    </div>
    <div class="field">
      <label class="field-label">価格</label>
      <input type="text" id="addPrice" placeholder="例: 3500">
    </div>
    <div class="field">
      <label class="field-label">カテゴリ</label>
      <div class="select-wrap">
        <select id="addCategory">
          <option value="" selected disabled>カテゴリを選択</option>
          <option>👗 ファッション</option>
          <option>💄 美容・スキンケア</option>

          <option value="家族へのプレゼント用">💝 家族へのプレゼント用</option>
          <option value="トレンドチェック用">✨ トレンドチェック用</option>
          <option value="参考・インスピレーション用">💡 参考・インスピレーション用</option>

<script>
// ── STATE ────────────────────────────────────────────────────────────────────
let items = JSON.parse(localStorage.getItem('kiNiNaru') || '[]');
let purposeFilter = 'all';
let categoryFilter = 'all';
let statusFilter  = 'all';
let currentId     = null;
let addImageData  = null;

const PURPOSE_ICONS = {
  '自分用':'🙋‍♀️','友達へのプレゼント用':'🎀','家族へのプレゼント用':'💝','トレンドチェック用':'✨','参考・インスピレーション用':'💡','旅行・お出かけ用':'✈️'
};

function formatPrice(p) {
  if (!p) return "";
  const s = p.replace(/[¥￥,]/g, "").trim();
  if (!s) return "";
  return isNaN(s) ? p : "\u00a5" + Number(s).toLocaleString("ja-JP");
}

function save() { localStorage.setItem('kiNiNaru', JSON.stringify(items)); }

// ── FILTER ───────────────────────────────────────────────────────────────────
function setPurposeFilter(v) {
  purposeFilter = v;
  document.querySelectorAll('[data-purpose]').forEach(el => {
    el.classList.toggle('active', el.dataset.purpose === v);
  });
  render();
}
function setCategoryFilter(v) {
  categoryFilter = v;
  document.querySelectorAll('[data-category]').forEach(el => {
    el.classList.toggle('active', el.dataset.category === v);
  });
  render();
}
function setStatusFilter(v) {
  statusFilter = v;
  document.querySelectorAll('[data-status]').forEach(el => el.classList.toggle('active', el.dataset.status === v));
  render();
}

// ── RENDER ───────────────────────────────────────────────────────────────────
function render() {
  const filtered = items.filter(it => {
    const pp = it.purposes || [it.purpose];
    if (purposeFilter !== 'all' && !pp.includes(purposeFilter)) return false;
    if (statusFilter === 'bought'   && !it.bought) return false;
    if (statusFilter === 'unbought' &&  it.bought) return false;
    return true;
  }).sort((a,b) => b.createdAt - a.createdAt);

  const boughtCount = items.filter(i=>i.bought).length;
  document.getElementById('headerCount').textContent =
    `${items.length} アイテム　·　購入済み ${boughtCount}`;

  const grid = document.getElementById('grid');
  if (!filtered.length) {
    grid.innerHTML = `<div class="empty" style="grid-column:span 2">
      <div class="empty-icon">🛍</div>
      <div class="empty-title">アイテムがありません</div>
      <div class="empty-sub">＋ボタンを押して<br>写真を追加しましょう</div>
    </div>`;
    return;
  }

  grid.innerHTML = filtered.map(it => {
    const pp = it.purposes || [it.purpose];
    const badgesHtml = pp.map(p =>
      `<div class="badge">${PURPOSE_ICONS[p]||''} ${shortPurpose(p)}</div>`
    ).join('');
    return `
    <div class="card${it.bought?' bought':''}" onclick="openDetail('${it.id}')">
      <div class="card-img-wrap">
        <img class="card-img" src="${it.imageUrl}" alt="${esc(it.name)}" onclick="event.stopPropagation();openLightbox(this.src)" style="cursor:zoom-in;">
        ${it.bought ? '<div class="card-bought-overlay">✅</div>' : ''}
        <div class="card-badges">${badgesHtml}</div>
      </div>
      <div class="card-body">
        <div class="card-cat">${esc(it.category)}</div>
        <div class="card-name">${esc(it.name)}</div>
        ${`<div class="card-price">${it.price ? esc(formatPrice(it.price)) : "¥ 不明"}</div>`}
        <button class="card-btn${it.bought?' bought':''}"
          onclick="event.stopPropagation();toggleBought('${it.id}')">
          ${it.bought ? '✓ 購入済み' : '購入済みにする'}
        </button>
      </div>
    </div>`;
  }).join('');
}

function shortPurpose(p) {
  return p.replace('へのプレゼント用',' 🎁').replace('参考・インスピレーション用','参考').replace('トレンドチェック用','トレンド').replace('旅行・お出かけ用','旅行').replace('自分用','自分');
}
function esc(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

// ── TOGGLE BOUGHT ─────────────────────────────────────────────────────────────
function toggleBought(id) {
  const it = items.find(i=>i.id===id);
  if (!it) return;
  it.bought = !it.bought;
  save(); render();
  // refresh detail if open
  if (currentId === id && document.getElementById('detailOverlay').classList.contains('open')) {
    renderDetail(it);
  }
}

// ── IMAGE HANDLING ────────────────────────────────────────────────────────────
function handleFile(input) {
  const file = input.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = e => {
    const img = new Image();
    img.onload = () => {
      const canvas = document.createElement('canvas');
      const maxW = 900;
      const scale = Math.min(1, maxW / img.width);
      canvas.width  = Math.round(img.width  * scale);
      canvas.height = Math.round(img.height * scale);
      canvas.getContext('2d').drawImage(img, 0, 0, canvas.width, canvas.height);
      addImageData = canvas.toDataURL('image/jpeg', 0.78);
      document.getElementById('imgPreview').src = addImageData;
      document.getElementById('imgPreview').style.display = 'block';
      document.getElementById('imgPickerArea').style.display = 'none';
    };
    img.src = e.target.result;
  };
  reader.readAsDataURL(file);
}

// ── PURPOSE TOGGLE ────────────────────────────────────────────────────────────
function togglePurpose(el, mode) {
  el.classList.toggle('checked');
}
function getCheckedPurposes(listId) {
  return Array.from(document.querySelectorAll(`#${listId} .purpose-item.checked`)).map(el=>el.dataset.p);
}
function setCheckedPurposes(listId, purposes) {
  document.querySelectorAll(`#${listId} .purpose-item`).forEach(el => {
    el.classList.toggle('checked', purposes.includes(el.dataset.p));
  });
}

// ── ADD SHEET ─────────────────────────────────────────────────────────────────
function openAdd() {
  addImageData = null;
  document.getElementById('fileInput').value = '';
  document.getElementById('imgPreview').style.display = 'none';
  document.getElementById('imgPickerArea').style.display = '';
  document.getElementById('addName').value = '';
  document.getElementById('addPrice').value = '';
  document.getElementById('addCategory').value = '';
  document.getElementById('addMemo').value = '';
  document.getElementById('addPurposeSelect').value = '';
  showError('addError', '');
  document.getElementById('addOverlay').classList.add('open');
  // シートのスクロールをトップに戻す
  const sheet = document.querySelector('#addOverlay .sheet');
  if (sheet) sheet.scrollTop = 0;
}
function closeAdd() { document.getElementById('addOverlay').classList.remove('open'); }

function showError(id, msg) {
  const el = document.getElementById(id);
  el.textContent = msg;
  el.classList.toggle('show', !!msg);
}

function saveItem() {
  const name     = document.getElementById('addName').value.trim();
  const purposeVal = document.getElementById('addPurposeSelect').value;
  if (!addImageData) { showError('addError','写真を選択してください'); return; }
  if (!name)          { showError('addError','商品名を入力してください'); return; }
  if (!purposeVal)    { showError('addError','目的を選択してください'); return; }
  const cat = document.getElementById('addCategory').value;
  if (!cat)           { showError('addError','カテゴリを選択してください'); return; }
  const purposes = [purposeVal];

  const item = {
    id:        `${Date.now()}_${Math.random().toString(36).slice(2,8)}`,
    imageUrl:  addImageData,
    name,
    price:     document.getElementById('addPrice').value.trim(),
    category:  document.getElementById('addCategory').value || 'その他',
    purposes,
    memo:      document.getElementById('addMemo').value.trim(),
    bought:    false,
    createdAt: Date.now(),
  };
  items.push(item);
  save(); render(); closeAdd();
}

// ── DETAIL SHEET ──────────────────────────────────────────────────────────────
function openDetail(id) {
  currentId = id;
  const it = items.find(i=>i.id===id);
  if (!it) return;
  document.getElementById('detailTitle').textContent = it.name;
  renderDetail(it);
  document.getElementById('detailOverlay').classList.add('open');
}
function closeDetail() {
  document.getElementById('detailOverlay').classList.remove('open');
  currentId = null;
}

function renderDetail(it) {
  const pp = it.purposes || [it.purpose || '自分用'];
  const badgesHtml = pp.map(p=>`<div class="purpose-badge">${PURPOSE_ICONS[p]||''} ${p}</div>`).join('');

  document.getElementById('detailBody').innerHTML = `
    <img src="${it.imageUrl}" alt="" onclick="openLightbox(this.src)" style="width:100%;border-radius:14px;object-fit:cover;max-height:260px;margin-bottom:16px;display:block;cursor:zoom-in;">
    <div class="purpose-badges">${badgesHtml}</div>
    <div class="info-row"><span class="info-label">商品名</span><span class="info-value">${esc(it.name)}</span></div>
    ${`<div class="info-row"><span class="info-label">価格</span><span class="info-value">${it.price ? esc(formatPrice(it.price)) : "¥ 不明"}</span></div>`}
    <div class="info-row"><span class="info-label">カテゴリ</span><span class="info-value">${esc(it.category)}</span></div>
    ${it.memo    ? `<div class="info-row"><span class="info-label">メモ</span><span class="info-value">${esc(it.memo)}</span></div>` : ''}
    <div class="info-row"><span class="info-label">登録日</span><span class="info-value">${new Date(it.createdAt).toLocaleDateString('ja-JP')}</span></div>

    <div style="margin-top:16px">
      <button class="bought-status-btn${it.bought?' is-bought':''}" onclick="toggleBought('${it.id}')">
        ${it.bought ? '✓ 購入済み（タップで戻す）' : '購入済みにする'}
      </button>
      <div class="btn-row">
        <button class="btn" style="font-size:12px" onclick="openEdit('${it.id}')">編集する</button>
        <button class="btn" style="font-size:12px;color:var(--danger)" onclick="confirmDelete('${it.id}')">削除</button>
      </div>
    </div>
    <div id="confirmDeleteBox"></div>
  `;
}

function confirmDelete(id) {
  document.getElementById('confirmDeleteBox').innerHTML = `
    <div class="confirm-box">
      <div class="confirm-text">このアイテムを削除しますか？</div>
      <div class="btn-row">
        <button class="btn" style="font-size:12px" onclick="document.getElementById('confirmDeleteBox').innerHTML=''">キャンセル</button>
        <button class="btn" style="font-size:12px;color:var(--danger);border-color:var(--danger)" onclick="doDelete('${id}')">削除する</button>
      </div>
    </div>`;
}

function doDelete(id) {
  items = items.filter(i=>i.id!==id);
  save(); render(); closeDetail();
}

// ── EDIT SHEET ────────────────────────────────────────────────────────────────
function openEdit(id) {
  const it = items.find(i=>i.id===id);
  if (!it) return;
  document.getElementById('editImgPreview').src = it.imageUrl;
  document.getElementById('editName').value     = it.name;
  document.getElementById('editPrice').value    = it.price || '';
  document.getElementById('editCategory').value = it.category;
  document.getElementById('editMemo').value     = it.memo || '';
  const pp = it.purposes || [it.purpose || ''];
  document.getElementById('editPurposeSelect').value = pp[0] || '';
  currentId = id;
  document.getElementById('editOverlay').classList.add('open');
}
function closeEdit() { document.getElementById('editOverlay').classList.remove('open'); }

function saveEdit() {
  const it = items.find(i=>i.id===currentId);
  if (!it) return;
  const name     = document.getElementById('editName').value.trim();
  const purposeVal = document.getElementById('editPurposeSelect').value;
  const purposes = purposeVal ? [purposeVal] : [];
  if (!name || !purposes.length) return;
  it.name     = name;
  it.price    = document.getElementById('editPrice').value.trim();
  it.category = document.getElementById('editCategory').value;
  it.purposes = purposes;
  it.memo     = document.getElementById('editMemo').value.trim();
  save(); render(); closeEdit(); closeDetail();
  // Scroll to the updated item card
  setTimeout(() => {
    const card = document.querySelector(`[onclick*="${it.id}"]`);
    if (card) card.scrollIntoView({ behavior: 'smooth', block: 'center' });
  }, 100);
}




// ── TITLE ─────────────────────────────────────────────────────────────────────
function saveTitle() {
  const val = document.getElementById('titleInput').value.trim();
  const title = val || '気になるリスト';
  document.getElementById('appTitle').textContent = title;
  localStorage.setItem('appTitle', title);
  closeProfileMenu();
}
function loadTitle() {
  const saved = localStorage.getItem('appTitle');
  if (saved) document.getElementById('appTitle').textContent = saved;
}

// ── COLLAPSE HEADER ───────────────────────────────────────────────────────────
let headerCollapsed = false;
function toggleHeader() {
  headerCollapsed = !headerCollapsed;
  document.querySelector('.header').classList.toggle('collapsed', headerCollapsed);
}

// Auto-collapse on scroll
let lastScrollY = 0;
window.addEventListener('scroll', () => {
  const y = window.scrollY;
  if (y > 80 && !headerCollapsed) {
    headerCollapsed = true;
    document.querySelector('.header').classList.add('collapsed');
  } else if (y < 20 && headerCollapsed) {
    headerCollapsed = false;
    document.querySelector('.header').classList.remove('collapsed');
  }
  lastScrollY = y;
}, { passive: true });

// ── PROFILE MENU ──────────────────────────────────────────────────────────────
function openProfileMenu() {
  syncProfileMenuIcon();
  syncThemeSelection();
  const saved = localStorage.getItem('appTitle') || '気になるリスト';
  document.getElementById('titleInput').value = saved;
  document.getElementById('profileMenuOverlay').classList.add('open');
}
function closeProfileMenu() {
  document.getElementById('profileMenuOverlay').classList.remove('open');
}
function syncProfileMenuIcon() {
  const saved = localStorage.getItem('profilePhoto');
  const menuImg = document.getElementById('profileMenuImg');
  const menuEmoji = document.getElementById('profileMenuEmoji');
  if (saved) {
    menuImg.src = saved; menuImg.style.display = 'block'; menuEmoji.style.display = 'none';
  } else {
    menuImg.style.display = 'none'; menuEmoji.style.display = '';
  }
}

// ── THEME ──────────────────────────────────────────────────────────────────────
const THEMES = ['simple','dark','cute'];
function setTheme(theme) {
  document.body.setAttribute('data-theme', theme === 'simple' ? '' : theme);
  localStorage.setItem('appTheme', theme);
  syncThemeSelection();
}
function syncThemeSelection() {
  const current = localStorage.getItem('appTheme') || 'simple';
  THEMES.forEach(t => {
    const item = document.querySelector('[data-theme="' + t + '"].theme-item');
    const check = document.getElementById('check-' + t);
    if (item) item.classList.toggle('selected', t === current);
    if (check) check.textContent = t === current ? '✓' : '';
  });
}
// Apply saved theme on load
const savedTheme = localStorage.getItem('appTheme') || 'simple';
if (savedTheme !== 'simple') document.body.setAttribute('data-theme', savedTheme);

// ── PROFILE PHOTO ──────────────────────────────────────────────────────────────
function handleProfilePhoto(input) {
  const file = input.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = e => {
    const img = new Image();
    img.onload = () => {
      const canvas = document.createElement('canvas');
      const size = 120;
      canvas.width = size; canvas.height = size;
      const ctx = canvas.getContext('2d');
      // crop to square center
      const min = Math.min(img.width, img.height);
      const sx = (img.width - min) / 2;
      const sy = (img.height - min) / 2;
      ctx.drawImage(img, sx, sy, min, min, 0, 0, size, size);
      const data = canvas.toDataURL('image/jpeg', 0.8);
      localStorage.setItem('profilePhoto', data);
      applyProfilePhoto(data);
    };
    img.src = e.target.result;
  };
  reader.readAsDataURL(file);
}

function applyProfilePhoto(data) {
  const img = document.getElementById('profileImg');
  const emoji = document.getElementById('profileEmoji');
  if (data) {
    img.src = data;
    img.style.display = 'block';
    emoji.style.display = 'none';
  } else {
    img.style.display = 'none';
    emoji.style.display = '';
  }
}

// Load saved profile photo on start
const savedProfile = localStorage.getItem('profilePhoto');
if (savedProfile) applyProfilePhoto(savedProfile);

// ── INIT ──
loadTitle();
render();

// ── LIGHTBOX ──────────────────────────────────────────────────────────────────
function openLightbox(src) {
  document.getElementById('lightboxImg').src = src;
  document.getElementById('lightbox').classList.add('open');
  document.body.style.overflow = 'hidden';
}
function closeLightbox() {
  document.getElementById('lightbox').classList.remove('open');
  document.body.style.overflow = '';
}
</script>

      <div style="display:flex;gap:8px;align-items:center;">
        <input type="text" id="titleInput" placeholder="気になるリスト" maxlength="20" style="flex:1;padding:11px 13px;border:1px solid var(--border);border-radius:10px;font-size:14px;font-family:inherit;outline:none;background:var(--bg);color:var(--text);">
        <button onclick="saveTitle()" style="padding:11px 16px;background:var(--text);color:#fff;border:none;border-radius:10px;font-size:13px;font-family:inherit;cursor:pointer;font-weight:500;white-space:nowrap;">変更</button>
      </div>
    </div>

    <!-- Theme selection -->
    <div style="margin-bottom:8px;">
      <label class="field-label">テーマカラー</label>
      <div style="display:flex;flex-direction:column;gap:10px;margin-top:6px;">
        <div class="theme-item" data-theme="simple" onclick="setTheme('simple')">
          <div class="theme-preview" style="background:linear-gradient(135deg,#F8F7F5,#FFFFFF);border:2px solid #EBEBEB;">
            <div style="width:10px;height:10px;border-radius:50%;background:#B07D62;"></div>
          </div>
          <div>
            <div class="theme-name">シンプル</div>
          </div>
          <div class="theme-check" id="check-simple">✓</div>
        </div>
        <div class="theme-item" data-theme="dark" onclick="setTheme('dark')">
          <div class="theme-preview" style="background:linear-gradient(135deg,#0D0D0D,#1A1A1A);border:2px solid #2E2E2E;">
            <div style="width:10px;height:10px;border-radius:50%;background:#F0F0F0;"></div>
          </div>
          <div>
            <div class="theme-name">モノトーン</div>
          </div>
          <div class="theme-check" id="check-dark"></div>
        </div>
        <div class="theme-item" data-theme="cute" onclick="setTheme('cute')">
          <div class="theme-preview" style="background:linear-gradient(135deg,#FDF0F3,#FAE0E5);border:2px solid #F4C2CE;">
            <div style="width:10px;height:10px;border-radius:50%;background:#C8445E;"></div>
          </div>
          <div>
            <div class="theme-name">ローズピンク</div>
          </div>
          <div class="theme-check" id="check-cute"></div>
        </div>
      </div>
    </div>
  </div>
</div>
</body>
</html>
