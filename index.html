<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<title>気になるリスト</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@300;400;600&family=Noto+Sans+JP:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #F8F7F5;
    --surface: #FFFFFF;
    --border: #EBEBEB;
    --text: #1C1C1E;
    --sub: #8E8E93;
    --accent: #B07D62;
    --accent-light: #F3EDE7;
    --bought: #34C759;
    --danger: #FF3B30;
    --shadow: 0 1px 6px rgba(0,0,0,0.07);
    --radius: 14px;
  }

  body {
    font-family: 'Noto Sans JP', 'Helvetica Neue', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    max-width: 430px;
    margin: 0 auto;
    -webkit-font-smoothing: antialiased;
  }

  /* ── HEADER ── */
  .header {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    position: sticky;
    top: 0;
    z-index: 100;
    padding: 18px 18px 0;
  }
  .header-top {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 14px;
  }
  .header-title { font-family: 'Noto Serif JP', serif; font-size: 20px; font-weight: 300; letter-spacing: 0.12em; }
  .header-count { font-size: 11px; color: var(--sub); margin-top: 2px; letter-spacing: 0.03em; }
  .header-icon { width: 38px; height: 38px; border-radius: 50%; background: var(--accent-light); display: flex; align-items: center; justify-content: center; font-size: 18px; }

  /* Purpose filter chips */
  .filter-chips {
    display: flex;
    gap: 7px;
    overflow-x: auto;
    padding-bottom: 12px;
    scrollbar-width: none;
  }
  .filter-chips::-webkit-scrollbar { display: none; }
  .chip {
    flex-shrink: 0;
    padding: 7px 15px;
    border-radius: 22px;
    border: none;
    cursor: pointer;
    font-size: 12px;
    font-family: inherit;
    font-weight: 400;
    background: var(--surface);
    color: var(--sub);
    box-shadow: var(--shadow);
    transition: all 0.2s;
    white-space: nowrap;
  }
  .chip.active { background: var(--text); color: #fff; font-weight: 600; box-shadow: none; }

  /* Status tabs */
  .status-tabs {
    display: flex;
    background: var(--bg);
    border-radius: 9px;
    padding: 3px;
    margin-bottom: 12px;
  }
  .tab {
    flex: 1;
    padding: 7px 0;
    border: none;
    cursor: pointer;
    font-size: 11px;
    font-family: inherit;
    border-radius: 7px;
    background: transparent;
    color: var(--sub);
    transition: all 0.2s;
  }
  .tab.active { background: var(--surface); color: var(--text); font-weight: 600; box-shadow: 0 1px 4px rgba(0,0,0,0.08); }

  /* ── GRID ── */
  .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 11px; padding: 14px 14px 110px; }

  /* ── CARD ── */
  .card {
    background: var(--surface);
    border-radius: var(--radius);
    overflow: hidden;
    box-shadow: var(--shadow);
    cursor: pointer;
    transition: transform 0.15s, opacity 0.2s;
  }
  .card:active { transform: scale(0.97); }
  .card.bought { opacity: 0.6; }

  .card-img-wrap { aspect-ratio: 1/1; overflow: hidden; background: var(--accent-light); position: relative; }
  .card-img { width: 100%; height: 100%; object-fit: cover; display: block; }
  .card-bought-overlay {
    position: absolute; inset: 0;
    background: rgba(255,255,255,0.5);
    display: flex; align-items: center; justify-content: center;
    font-size: 28px;
  }
  .card-badges { position: absolute; top: 8px; left: 8px; display: flex; flex-direction: column; gap: 4px; }
  .badge {
    background: rgba(255,255,255,0.92);
    border-radius: 20px; padding: 3px 8px;
    font-size: 9px; font-weight: 500; color: var(--text);
    white-space: nowrap;
    max-width: 100px;
    overflow: hidden; text-overflow: ellipsis;
  }

  .card-body { padding: 10px 11px 12px; }
  .card-cat { font-size: 10px; color: var(--accent); font-weight: 600; letter-spacing: 0.04em; margin-bottom: 3px; }
  .card-name {
    font-size: 12px; color: var(--text); font-weight: 500; line-height: 1.45; margin-bottom: 5px;
    display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden;
  }
  .card-price { font-size: 12px; color: var(--sub); margin-bottom: 8px; }
  .card-btn {
    width: 100%; padding: 6px 0; border-radius: 7px; cursor: pointer;
    font-size: 10px; font-family: inherit; border: 1px solid var(--border);
    background: transparent; color: var(--sub); transition: all 0.2s;
  }
  .card-btn.bought { background: #EDFBF1; color: var(--bought); border-color: var(--bought); font-weight: 600; }

  /* ── EMPTY ── */
  .empty { text-align: center; padding: 72px 24px; }
  .empty-icon { font-size: 56px; margin-bottom: 16px; }
  .empty-title { color: var(--text); font-size: 15px; font-weight: 500; margin-bottom: 6px; }
  .empty-sub { color: var(--sub); font-size: 13px; line-height: 1.6; }

  /* ── FAB ── */
  .fab {
    position: fixed; bottom: 30px; right: 20px;
    width: 58px; height: 58px; border-radius: 50%;
    border: none; cursor: pointer;
    background: var(--text); color: #fff; font-size: 30px;
    box-shadow: 0 4px 20px rgba(0,0,0,0.22);
    display: flex; align-items: center; justify-content: center;
    z-index: 150; transition: transform 0.15s, box-shadow 0.15s;
    line-height: 1;
  }
  .fab:active { transform: scale(0.93); }

  /* ── OVERLAY ── */
  .overlay {
    display: none;
    position: fixed; inset: 0; z-index: 200;
    flex-direction: column;
  }
  .overlay.open { display: flex; }
  .overlay-backdrop {
    position: absolute; inset: 0;
    background: rgba(0,0,0,0.35);
    backdrop-filter: blur(2px);
  }
  .sheet {
    position: relative; margin-top: auto;
    background: var(--surface);
    border-radius: 22px 22px 0 0;
    max-height: 88vh; overflow-y: auto; -webkit-overflow-scrolling: touch;
    padding: 0 20px 80px;
    overscroll-behavior: contain;
  }
  .sheet-handle { width: 36px; height: 4px; border-radius: 2px; background: var(--border); margin: 12px auto 0; }
  .sheet-header {
    display: flex; justify-content: space-between; align-items: center;
    padding: 16px 0 14px;
    position: sticky; top: 0; background: var(--surface); z-index: 1;
    border-bottom: 1px solid var(--border); margin-bottom: 16px;
  }
  .sheet-title { font-family: 'Noto Serif JP', serif; font-size: 15px; font-weight: 600; letter-spacing: 0.06em; }
  .sheet-close {
    border: none; background: var(--bg); border-radius: 50%;
    width: 30px; height: 30px; cursor: pointer;
    font-size: 15px; color: var(--sub);
    display: flex; align-items: center; justify-content: center;
  }

  /* ── FORM ── */
  label.field-label { display: block; font-size: 11px; color: var(--sub); margin-bottom: 5px; font-weight: 500; letter-spacing: 0.05em; }
  .field { margin-bottom: 14px; }
  input[type=text], input[type=url], textarea, select {
    width: 100%; padding: 11px 13px; border: 1px solid var(--border);
    border-radius: 10px; font-size: 14px; font-family: inherit;
    outline: none; background: var(--bg); color: var(--text);
    appearance: none; -webkit-appearance: none;
  }
  textarea { resize: none; height: 64px; line-height: 1.5; }
  input:focus, textarea:focus, select:focus { border-color: var(--accent); }

  .select-wrap { position: relative; }
  .select-wrap::after { content: '▾'; position: absolute; right: 12px; top: 50%; transform: translateY(-50%); pointer-events: none; color: var(--sub); font-size: 12px; }

  /* Image preview */
  .img-preview-area { display: block;
    border: 2px dashed var(--accent); border-radius: 18px;
    padding: 44px 24px; cursor: pointer; background: var(--accent-light);
    text-align: center; margin-bottom: 14px;
  }
  .img-preview-icon { font-size: 48px; margin-bottom: 12px; }
  .img-preview-text { color: var(--text); font-size: 14px; font-weight: 500; margin-bottom: 4px; }
  .img-preview-sub { color: var(--sub); font-size: 11px; }
  .img-preview { width: 100%; border-radius: var(--radius); object-fit: cover; max-height: 220px; display: none; margin-bottom: 14px; }

  /* Purpose checkboxes */
  .purpose-list { display: flex; flex-direction: column; gap: 8px; }
  .purpose-item {
    display: flex; align-items: center; gap: 10px;
    padding: 10px 13px; border: 1px solid var(--border);
    border-radius: 10px; cursor: pointer; background: var(--bg);
    transition: all 0.15s; user-select: none;
  }
  .purpose-item.checked { border-color: var(--accent); background: var(--accent-light); }
  .purpose-check {
    width: 20px; height: 20px; border-radius: 6px; flex-shrink: 0;
    border: 2px solid var(--border); background: transparent;
    display: flex; align-items: center; justify-content: center;
    font-size: 12px; color: #fff; transition: all 0.15s;
  }
  .purpose-item.checked .purpose-check { background: var(--accent); border-color: var(--accent); }
  .purpose-label { font-size: 13px; color: var(--text); }

  /* Error */
  .error-msg { background: #FFF2F0; border: 1px solid #FFCCC7; border-radius: 8px; padding: 10px 12px; font-size: 12px; color: var(--danger); margin-bottom: 12px; display: none; }
  .error-msg.show { display: block; }

  /* Buttons */
  .btn { padding: 13px; border-radius: 10px; cursor: pointer; font-size: 14px; font-family: inherit; font-weight: 500; border: 1px solid var(--border); background: var(--surface); color: var(--text); width: 100%; transition: opacity 0.15s; }
  .btn:active { opacity: 0.7; }
  .btn-primary { background: var(--text); color: #fff; border-color: var(--text); }
  .btn-danger { color: var(--danger); background: transparent; border: none; font-size: 12px; }
  .btn-amazon { background: #FF9900; color: #fff; border: none; font-size: 13px; font-weight: 600; display: flex; align-items: center; justify-content: center; gap: 6px; text-decoration: none; padding: 13px; border-radius: 10px; }
  .btn-row { display: flex; gap: 8px; }
  .btn-row .btn { flex: 1; padding: 10px; font-size: 12px; }

  /* Detail info rows */
  .info-row { display: flex; justify-content: space-between; padding: 11px 0; border-bottom: 1px solid var(--border); }
  .info-label { font-size: 12px; color: var(--sub); flex-shrink: 0; margin-right: 12px; }
  .info-value { font-size: 13px; color: var(--text); font-weight: 500; text-align: right; word-break: break-all; }

  .purpose-badges { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 14px; }
  .purpose-badge { display: inline-flex; align-items: center; gap: 4px; background: var(--accent-light); border-radius: 20px; padding: 6px 14px; font-size: 12px; color: var(--accent); font-weight: 600; }

  .confirm-box { background: #FFF2F0; border-radius: 10px; padding: 14px; text-align: center; margin-top: 14px; }
  .confirm-text { font-size: 13px; margin-bottom: 10px; }

  .bought-status-btn { width: 100%; padding: 12px; border-radius: 10px; cursor: pointer; font-size: 13px; font-family: inherit; font-weight: 500; border: 1px solid var(--border); background: var(--accent-light); color: var(--text); transition: all 0.2s; margin-bottom: 8px; }
  .bought-status-btn.is-bought { background: #EDFBF1; color: var(--bought); border-color: var(--bought); }
</style>
</head>
<body>

<!-- ── HEADER ── -->
<div class="header">
  <div class="header-top">
    <div>
      <div class="header-title">気になるリスト</div>
      <div class="header-count" id="headerCount">0 アイテム</div>
    </div>
    <div class="header-icon">🛍</div>
  </div>

  <div class="filter-chips" id="purposeChips">
    <button class="chip active" data-purpose="all" onclick="setPurposeFilter('all')">すべて</button>
    <button class="chip" data-purpose="自分用" onclick="setPurposeFilter('自分用')">🙋‍♀️ 自分</button>
    <button class="chip" data-purpose="友達へのプレゼント用" onclick="setPurposeFilter('友達へのプレゼント用')">🎀 友達</button>
    <button class="chip" data-purpose="家族へのプレゼント用" onclick="setPurposeFilter('家族へのプレゼント用')">💝 家族</button>
    <button class="chip" data-purpose="インテリア・部屋用" onclick="setPurposeFilter('インテリア・部屋用')">🏡 インテリア</button>
  </div>

  <div class="status-tabs">
    <button class="tab active" data-status="all" onclick="setStatusFilter('all')">すべて</button>
    <button class="tab" data-status="unbought" onclick="setStatusFilter('unbought')">未購入</button>
    <button class="tab" data-status="bought" onclick="setStatusFilter('bought')">購入済み ✓</button>
  </div>
</div>

<!-- ── GRID ── -->
<div class="grid" id="grid"></div>

<!-- ── FAB ── -->
<button class="fab" onclick="openAdd()">＋</button>

<!-- ══════════════════════════════════
     ADD SHEET
════════════════════════════════════ -->
<div class="overlay" id="addOverlay">
  <div class="overlay-backdrop" onclick="closeAdd()"></div>
  <div class="sheet">
    <div class="sheet-handle"></div>
    <div class="sheet-header">
      <span class="sheet-title">写真を追加</span>
      <button class="sheet-close" onclick="closeAdd()">✕</button>
    </div>

    <!-- Image picker -->
    <label for="fileInput" class="img-preview-area" id="imgPickerArea">
      <div class="img-preview-icon">📸</div>
      <div class="img-preview-text">写真を選択</div>
      <div class="img-preview-sub">カメラロール・スクショから選んでください</div>
    </label>
    <img class="img-preview" id="imgPreview" alt="">
    <input type="file" id="fileInput" accept="image/*" style="display:none" onchange="handleFile(this)">

    <div class="error-msg" id="addError"></div>

    <div class="field">
      <label class="field-label">商品名 *</label>
      <input type="text" id="addName" placeholder="例: UVケアクリーム SPF50+">
    </div>
    <div class="field">
      <label class="field-label">価格</label>
      <input type="text" id="addPrice" placeholder="例: 3500">
    </div>
    <div class="field">
      <label class="field-label">カテゴリ</label>
      <div class="select-wrap">
        <select id="addCategory">
          <option>ファッション</option>
          <option>美容・コスメ</option>
          <option>食品・グルメ</option>
          <option>インテリア</option>
          <option>電化製品</option>
          <option selected>その他</option>
        </select>
      </div>
    </div>
    <div class="field">
      <label class="field-label">目的 *（複数選択可）</label>
      <div class="purpose-list" id="addPurposeList">
        <div class="purpose-item" data-p="自分用" onclick="togglePurpose(this,'add')">
          <div class="purpose-check"></div><span class="purpose-label">🙋‍♀️ 自分用</span>
        </div>
        <div class="purpose-item" data-p="友達へのプレゼント用" onclick="togglePurpose(this,'add')">
          <div class="purpose-check"></div><span class="purpose-label">🎀 友達へのプレゼント用</span>
        </div>
        <div class="purpose-item" data-p="家族へのプレゼント用" onclick="togglePurpose(this,'add')">
          <div class="purpose-check"></div><span class="purpose-label">💝 家族へのプレゼント用</span>
        </div>
        <div class="purpose-item" data-p="インテリア・部屋用" onclick="togglePurpose(this,'add')">
          <div class="purpose-check"></div><span class="purpose-label">🏡 インテリア・部屋用</span>
        </div>
      </div>
    </div>
    <div class="field">
      <label class="field-label">購入先 / メモ</label>
      <textarea id="addMemo" placeholder="例: Amazonで¥3,500 / Mサイズ・ベージュ希望"></textarea>
    </div>
    <button class="btn btn-primary" style="margin-top:4px" onclick="saveItem()">保存する</button>
  </div>
</div>

<!-- ══════════════════════════════════
     DETAIL SHEET
════════════════════════════════════ -->
<div class="overlay" id="detailOverlay">
  <div class="overlay-backdrop" onclick="closeDetail()"></div>
  <div class="sheet" id="detailSheet">
    <div class="sheet-handle"></div>
    <div class="sheet-header">
      <span class="sheet-title" id="detailTitle">詳細</span>
      <button class="sheet-close" onclick="closeDetail()">✕</button>
    </div>
    <div id="detailBody"></div>
  </div>
</div>

<!-- ══════════════════════════════════
     EDIT SHEET
════════════════════════════════════ -->
<div class="overlay" id="editOverlay">
  <div class="overlay-backdrop" onclick="closeEdit()"></div>
  <div class="sheet">
    <div class="sheet-handle"></div>
    <div class="sheet-header">
      <span class="sheet-title">編集</span>
      <button class="sheet-close" onclick="closeEdit()">✕</button>
    </div>

    <img class="img-preview" id="editImgPreview" alt="" style="display:block;margin-bottom:14px;">

    <div class="field">
      <label class="field-label">商品名 *</label>
      <input type="text" id="editName">
    </div>
    <div class="field">
      <label class="field-label">価格</label>
      <input type="text" id="editPrice">
    </div>
    <div class="field">
      <label class="field-label">カテゴリ</label>
      <div class="select-wrap">
        <select id="editCategory">
          <option>ファッション</option>
          <option>美容・コスメ</option>
          <option>食品・グルメ</option>
          <option>インテリア</option>
          <option>電化製品</option>
          <option>その他</option>
        </select>
      </div>
    </div>
    <div class="field">
      <label class="field-label">目的（複数選択可）</label>
      <div class="purpose-list" id="editPurposeList">
        <div class="purpose-item" data-p="自分用" onclick="togglePurpose(this,'edit')">
          <div class="purpose-check"></div><span class="purpose-label">🙋‍♀️ 自分用</span>
        </div>
        <div class="purpose-item" data-p="友達へのプレゼント用" onclick="togglePurpose(this,'edit')">
          <div class="purpose-check"></div><span class="purpose-label">🎀 友達へのプレゼント用</span>
        </div>
        <div class="purpose-item" data-p="家族へのプレゼント用" onclick="togglePurpose(this,'edit')">
          <div class="purpose-check"></div><span class="purpose-label">💝 家族へのプレゼント用</span>
        </div>
        <div class="purpose-item" data-p="インテリア・部屋用" onclick="togglePurpose(this,'edit')">
          <div class="purpose-check"></div><span class="purpose-label">🏡 インテリア・部屋用</span>
        </div>
      </div>
    </div>
    <div class="field">
      <label class="field-label">購入先 / メモ</label>
      <textarea id="editMemo"></textarea>
    </div>
    <div class="btn-row" style="margin-top:4px">
      <button class="btn" onclick="closeEdit()">キャンセル</button>
      <button class="btn btn-primary" onclick="saveEdit()">保存</button>
    </div>
  </div>
</div>

<script>
// ── STATE ────────────────────────────────────────────────────────────────────
let items = JSON.parse(localStorage.getItem('kiNiNaru') || '[]');
let purposeFilter = 'all';
let statusFilter  = 'all';
let currentId     = null;
let addImageData  = null;

const PURPOSE_ICONS = {
  '自分用':'🙋‍♀️','友達へのプレゼント用':'🎀','家族へのプレゼント用':'💝','インテリア・部屋用':'🏡'
};

function formatPrice(p) {
  if (!p) return "";
  const s = p.replace(/[¥￥,]/g, "").trim();
  if (!s) return "";
  return isNaN(s) ? p : "\u00a5" + Number(s).toLocaleString("ja-JP");
}

function save() { localStorage.setItem('kiNiNaru', JSON.stringify(items)); }

// ── FILTER ───────────────────────────────────────────────────────────────────
function setPurposeFilter(v) {
  purposeFilter = v;
  document.querySelectorAll('[data-purpose]').forEach(el => el.classList.toggle('active', el.dataset.purpose === v));
  render();
}
function setStatusFilter(v) {
  statusFilter = v;
  document.querySelectorAll('[data-status]').forEach(el => el.classList.toggle('active', el.dataset.status === v));
  render();
}

// ── RENDER ───────────────────────────────────────────────────────────────────
function render() {
  const filtered = items.filter(it => {
    const pp = it.purposes || [it.purpose];
    if (purposeFilter !== 'all' && !pp.includes(purposeFilter)) return false;
    if (statusFilter === 'bought'   && !it.bought) return false;
    if (statusFilter === 'unbought' &&  it.bought) return false;
    return true;
  }).sort((a,b) => b.createdAt - a.createdAt);

  const boughtCount = items.filter(i=>i.bought).length;
  document.getElementById('headerCount').textContent =
    `${items.length} アイテム　·　購入済み ${boughtCount}`;

  const grid = document.getElementById('grid');
  if (!filtered.length) {
    grid.innerHTML = `<div class="empty" style="grid-column:span 2">
      <div class="empty-icon">🛍</div>
      <div class="empty-title">アイテムがありません</div>
      <div class="empty-sub">＋ボタンを押して<br>写真を追加しましょう</div>
    </div>`;
    return;
  }

  grid.innerHTML = filtered.map(it => {
    const pp = it.purposes || [it.purpose];
    const badgesHtml = pp.map(p =>
      `<div class="badge">${PURPOSE_ICONS[p]||''} ${shortPurpose(p)}</div>`
    ).join('');
    return `
    <div class="card${it.bought?' bought':''}" onclick="openDetail('${it.id}')">
      <div class="card-img-wrap">
        <img class="card-img" src="${it.imageUrl}" alt="${esc(it.name)}">
        ${it.bought ? '<div class="card-bought-overlay">✅</div>' : ''}
        <div class="card-badges">${badgesHtml}</div>
      </div>
      <div class="card-body">
        <div class="card-cat">${esc(it.category)}</div>
        <div class="card-name">${esc(it.name)}</div>
        ${it.price ? `<div class="card-price">${esc(formatPrice(it.price))}</div>` : ''}
        <button class="card-btn${it.bought?' bought':''}"
          onclick="event.stopPropagation();toggleBought('${it.id}')">
          ${it.bought ? '✓ 購入済み' : '購入済みにする'}
        </button>
      </div>
    </div>`;
  }).join('');
}

function shortPurpose(p) {
  return p.replace('へのプレゼント用',' 🎁').replace('インテリア・部屋用','インテリア').replace('自分用','自分');
}
function esc(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

// ── TOGGLE BOUGHT ─────────────────────────────────────────────────────────────
function toggleBought(id) {
  const it = items.find(i=>i.id===id);
  if (!it) return;
  it.bought = !it.bought;
  save(); render();
  // refresh detail if open
  if (currentId === id && document.getElementById('detailOverlay').classList.contains('open')) {
    renderDetail(it);
  }
}

// ── IMAGE HANDLING ────────────────────────────────────────────────────────────
function handleFile(input) {
  const file = input.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = e => {
    const img = new Image();
    img.onload = () => {
      const canvas = document.createElement('canvas');
      const maxW = 900;
      const scale = Math.min(1, maxW / img.width);
      canvas.width  = Math.round(img.width  * scale);
      canvas.height = Math.round(img.height * scale);
      canvas.getContext('2d').drawImage(img, 0, 0, canvas.width, canvas.height);
      addImageData = canvas.toDataURL('image/jpeg', 0.78);
      document.getElementById('imgPreview').src = addImageData;
      document.getElementById('imgPreview').style.display = 'block';
      document.getElementById('imgPickerArea').style.display = 'none';
    };
    img.src = e.target.result;
  };
  reader.readAsDataURL(file);
}

// ── PURPOSE TOGGLE ────────────────────────────────────────────────────────────
function togglePurpose(el, mode) {
  el.classList.toggle('checked');
}
function getCheckedPurposes(listId) {
  return Array.from(document.querySelectorAll(`#${listId} .purpose-item.checked`)).map(el=>el.dataset.p);
}
function setCheckedPurposes(listId, purposes) {
  document.querySelectorAll(`#${listId} .purpose-item`).forEach(el => {
    el.classList.toggle('checked', purposes.includes(el.dataset.p));
  });
}

// ── ADD SHEET ─────────────────────────────────────────────────────────────────
function openAdd() {
  addImageData = null;
  document.getElementById('fileInput').value = '';
  document.getElementById('imgPreview').style.display = 'none';
  document.getElementById('imgPickerArea').style.display = '';
  document.getElementById('addName').value = '';
  document.getElementById('addPrice').value = '';
  document.getElementById('addCategory').value = 'その他';
  document.getElementById('addMemo').value = '';
  document.querySelectorAll('#addPurposeList .purpose-item').forEach(el=>el.classList.remove('checked'));
  showError('addError', '');
  document.getElementById('addOverlay').classList.add('open');
}
function closeAdd() { document.getElementById('addOverlay').classList.remove('open'); }

function showError(id, msg) {
  const el = document.getElementById(id);
  el.textContent = msg;
  el.classList.toggle('show', !!msg);
}

function saveItem() {
  const name     = document.getElementById('addName').value.trim();
  const purposes = getCheckedPurposes('addPurposeList');
  if (!addImageData) { showError('addError','写真を選択してください'); return; }
  if (!name)          { showError('addError','商品名を入力してください'); return; }
  if (!purposes.length){ showError('addError','目的を1つ以上選択してください'); return; }

  const item = {
    id:        `${Date.now()}_${Math.random().toString(36).slice(2,8)}`,
    imageUrl:  addImageData,
    name,
    price:     document.getElementById('addPrice').value.trim(),
    category:  document.getElementById('addCategory').value,
    purposes,
    memo:      document.getElementById('addMemo').value.trim(),
    bought:    false,
    createdAt: Date.now(),
  };
  items.push(item);
  save(); render(); closeAdd();
}

// ── DETAIL SHEET ──────────────────────────────────────────────────────────────
function openDetail(id) {
  currentId = id;
  const it = items.find(i=>i.id===id);
  if (!it) return;
  document.getElementById('detailTitle').textContent = it.name;
  renderDetail(it);
  document.getElementById('detailOverlay').classList.add('open');
}
function closeDetail() {
  document.getElementById('detailOverlay').classList.remove('open');
  currentId = null;
}

function renderDetail(it) {
  const pp = it.purposes || [it.purpose || '自分用'];
  const badgesHtml = pp.map(p=>`<div class="purpose-badge">${PURPOSE_ICONS[p]||''} ${p}</div>`).join('');

  document.getElementById('detailBody').innerHTML = `
    <img src="${it.imageUrl}" alt="" style="width:100%;border-radius:14px;object-fit:cover;max-height:260px;margin-bottom:16px;display:block;">
    <div class="purpose-badges">${badgesHtml}</div>
    <div class="info-row"><span class="info-label">商品名</span><span class="info-value">${esc(it.name)}</span></div>
    ${it.price ? `<div class="info-row"><span class="info-label">価格</span><span class="info-value">${esc(formatPrice(it.price))}</span></div>` : ''}
    <div class="info-row"><span class="info-label">カテゴリ</span><span class="info-value">${esc(it.category)}</span></div>
    ${it.memo    ? `<div class="info-row"><span class="info-label">メモ</span><span class="info-value">${esc(it.memo)}</span></div>` : ''}
    <div class="info-row"><span class="info-label">登録日</span><span class="info-value">${new Date(it.createdAt).toLocaleDateString('ja-JP')}</span></div>

    <div style="margin-top:16px">
      <button class="bought-status-btn${it.bought?' is-bought':''}" onclick="toggleBought('${it.id}')">
        ${it.bought ? '✓ 購入済み（タップで戻す）' : '購入済みにする'}
      </button>
      <div class="btn-row">
        <button class="btn" style="font-size:12px" onclick="openEdit('${it.id}')">編集する</button>
        <button class="btn" style="font-size:12px;color:var(--danger)" onclick="confirmDelete('${it.id}')">削除</button>
      </div>
    </div>
    <div id="confirmDeleteBox"></div>
  `;
}

function confirmDelete(id) {
  document.getElementById('confirmDeleteBox').innerHTML = `
    <div class="confirm-box">
      <div class="confirm-text">このアイテムを削除しますか？</div>
      <div class="btn-row">
        <button class="btn" style="font-size:12px" onclick="document.getElementById('confirmDeleteBox').innerHTML=''">キャンセル</button>
        <button class="btn" style="font-size:12px;color:var(--danger);border-color:var(--danger)" onclick="doDelete('${id}')">削除する</button>
      </div>
    </div>`;
}

function doDelete(id) {
  items = items.filter(i=>i.id!==id);
  save(); render(); closeDetail();
}

// ── EDIT SHEET ────────────────────────────────────────────────────────────────
function openEdit(id) {
  const it = items.find(i=>i.id===id);
  if (!it) return;
  document.getElementById('editImgPreview').src = it.imageUrl;
  document.getElementById('editName').value     = it.name;
  document.getElementById('editPrice').value    = it.price || '';
  document.getElementById('editCategory').value = it.category;
  document.getElementById('editMemo').value     = it.memo || '';
  const pp = it.purposes || [it.purpose || '自分用'];
  setCheckedPurposes('editPurposeList', pp);
  currentId = id;
  document.getElementById('editOverlay').classList.add('open');
}
function closeEdit() { document.getElementById('editOverlay').classList.remove('open'); }

function saveEdit() {
  const it = items.find(i=>i.id===currentId);
  if (!it) return;
  const name     = document.getElementById('editName').value.trim();
  const purposes = getCheckedPurposes('editPurposeList');
  if (!name || !purposes.length) return;
  it.name     = name;
  it.price    = document.getElementById('editPrice').value.trim();
  it.category = document.getElementById('editCategory').value;
  it.purposes = purposes;
  it.memo     = document.getElementById('editMemo').value.trim();
  save(); render(); closeEdit();
  // refresh detail
  if (document.getElementById('detailOverlay').classList.contains('open')) {
    document.getElementById('detailTitle').textContent = it.name;
    renderDetail(it);
  }
}

// ── INIT ──────────────────────────────────────────────────────────────────────
render();
</script>
</body>
</html>
